services:
  training-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: musicprint-training:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/vol/cache/huggingface
      - JUPYTER_TOKEN=musicprint
      - WANDB_MODE=disabled
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ./release:/vol/release
      - ../music:/vol/src_music:ro
      - musicprint_training_processed:/vol/data
      - musicprint_training_logs:/vol/logs
      - musicprint_training_checkpoints:/vol/checkpoints
      - musicprint_training_cache:/vol/cache
    ports:
      - "8888:8888"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: '8gb'
    stdin_open: true
    tty: true
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='musicprint'

volumes:
  musicprint_training_processed:
  musicprint_training_logs:
  musicprint_training_checkpoints:
  musicprint_training_cache:
