services:
  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    image: musicprint-pipeline:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/app/cache/huggingface
    volumes:
      - ./pipeline/src:/app/src
      - ./pipeline/data:/app/data
      - ./pipeline/cache:/app/cache
      - ./pipeline/checkpoints:/app/checkpoints
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: '8gb'
    stdin_open: true
    tty: true
    command: /bin/bash
