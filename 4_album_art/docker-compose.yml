services:
  art-tokenizer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    image: musicprint-pipeline:latest
    container_name: musicprint-art-tokenizer
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ../3_meta_tokenizer/release:/vol/meta_release:ro
      - art-pipeline-data:/vol/data
      - art-pipeline-logs:/vol/logs
      - art-pipeline-checkpoints:/vol/checkpoints
    environment:
      - PYTHONPATH=/app/src
    # Enable GPU support if available (comment out if on CPU-only machine)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: 8g
    command: tail -f /dev/null

volumes:
  art-pipeline-data:
  art-pipeline-logs:
  art-pipeline-checkpoints:
