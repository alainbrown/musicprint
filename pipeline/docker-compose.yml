services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: musicprint-pipeline:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/app/cache/huggingface
      - JUPYTER_TOKEN=musicprint  # Security token for easy login
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./cache:/app/cache
      - ./checkpoints:/app/checkpoints
      - ./notebooks:/app/notebooks # New volume for notebooks
    ports:
      - "8888:8888"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: '8gb'
    stdin_open: true
    tty: true
    # Launch Jupyter Lab by default
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='musicprint'