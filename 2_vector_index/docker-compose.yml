services:
  index-pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    image: musicprint-pipeline:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ./release:/app/release
      # Mount the release folder from the training pipeline to access the model
      - ../1_adapter_training/release:/vol/model:ro
      - ../music:/vol/src_music:ro
      # Reuse processed data from training pipeline
      - 1_adapter_training_musicprint_training_processed:/vol/data
      - musicprint_index_cache:/vol/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: '4gb'
    stdin_open: true
    tty: true
    command: python src/pipeline.py --model_path /vol/model/encoder.pt --index_dir /app/release/index

volumes:
  # Reference the external volume created by the other pipeline
  1_adapter_training_musicprint_training_processed:
    external: true
  musicprint_index_cache:
